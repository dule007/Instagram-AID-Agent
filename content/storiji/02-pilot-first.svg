<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="pbg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="1" stop-color="#10283D"/>
    </linearGradient>
    <pattern id="pdots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#24405D"/>
    </pattern>
  </defs>
  <rect width="1080" height="1920" fill="url(#pbg)"/>
  <rect width="1080" height="1920" fill="url(#pdots)"/>
  <g font-family="DejaVu Sans, Arial, sans-serif">
    <text x="90" y="260" fill="#F4F7FB" font-size="25" font-weight="700" letter-spacing="2">AID / AUTOINSIGHT DATA</text>
    <text x="90" y="390" fill="#FFB547" font-size="22" font-weight="700" letter-spacing="4">PILOT-FIRST</text>
    <text x="90" y="515" fill="#F4F7FB" font-size="76" font-weight="700">
      <tspan x="90">Prvo provjerite</tspan>
      <tspan x="90" dy="92" fill="#20D3EE">signal.</tspan>
      <tspan x="90" dy="92">Zatim širite</tspan>
      <tspan x="90" dy="92">sustav.</tspan>
    </text>

    <g transform="translate(90 940)">
      <line x1="54" y1="50" x2="54" y2="500" stroke="#24405D" stroke-width="4"/>
      <g>
        <circle cx="54" cy="54" r="42" fill="#20D3EE"/>
        <text x="54" y="65" text-anchor="middle" fill="#07111F" font-size="30" font-weight="700">1</text>
        <text x="130" y="48" fill="#F4F7FB" font-size="31" font-weight="700">Jedan problem</text>
        <text x="130" y="87" fill="#9CB0C8" font-size="20">regija, kategorija, poslovnica ili portfelj</text>
      </g>
      <g transform="translate(0 220)">
        <circle cx="54" cy="54" r="42" fill="#20D3EE"/>
        <text x="54" y="65" text-anchor="middle" fill="#07111F" font-size="30" font-weight="700">2</text>
        <text x="130" y="48" fill="#F4F7FB" font-size="31" font-weight="700">Jedan KPI</text>
        <text x="130" y="87" fill="#9CB0C8" font-size="20">unaprijed dogovoren kriterij uspjeha</text>
      </g>
      <g transform="translate(0 440)">
        <circle cx="54" cy="54" r="42" fill="#FFB547"/>
        <text x="54" y="65" text-anchor="middle" fill="#07111F" font-size="30" font-weight="700">3</text>
        <text x="130" y="48" fill="#F4F7FB" font-size="31" font-weight="700">Jedna odluka</text>
        <text x="130" y="87" fill="#9CB0C8" font-size="20">provjera mijenja li signal stvarni potez</text>
      </g>
    </g>

    <rect x="90" y="1595" width="900" height="120" rx="30" fill="#20D3EE"/>
    <text x="140" y="1668" fill="#07111F" font-size="31" font-weight="700">Definirajte pilot</text>
    <circle cx="920" cy="1655" r="30" fill="#07111F"/>
    <path d="M904 1655h32m-11-11 11 11-11 11" fill="none" stroke="#20D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="1785" fill="#9CB0C8" font-size="20">autoinsightdata.com</text>
  </g>
