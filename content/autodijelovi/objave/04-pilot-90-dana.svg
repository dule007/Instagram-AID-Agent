  <defs><linearGradient id="bg" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#07111F"/><stop offset="1" stop-color="#10283D"/></linearGradient><pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="#24405D"/></pattern></defs>
